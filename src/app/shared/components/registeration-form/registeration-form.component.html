<div
  class="d-flex flex-column align-items-center justify-content-center min-vh-100"
>
  <form class="form" (submit)="onSubmit()" [formGroup]="registerForm">
    <p class="title">Register</p>
    <p class="message">Signup now and get full access to our app.</p>
    <div class="flex">
      <label>
        <input required="" placeholder="" type="text" class="input" />
        <span>Firstname</span>
      </label>

      <label>
        <input required="" placeholder="" type="text" class="input" />
        <span>Lastname</span>
      </label>
    </div>

    <label>
      <input required="" placeholder="" type="email" class="input" />
      <span>Email</span>
    </label>

    <label>
      <input required="" placeholder="" type="password" class="input" />
      <span>Password</span>
    </label>
    <label>
      <input required="" placeholder="" type="password" class="input" />
      <span>Confirm password</span>
    </label>
    <label>
      <select required="" placeholder="" type="password" class="input">
        <option value="doctor">Doctor</option>
        <option value="recepionist">Receptionist</option>
        <option value="patient">Patient</option>
      </select>
      <span>Role</span>
    </label>

    <button class="submit">Register</button>
    <p class="signin">
      Already have an account ? <a routerLink="/login">Sign In</a>
    </p>
  </form>
</div>
