<div class="login-page">

  <!-- ── Left Branding ─────────────────────────────────────────── -->
  <section class="branding-panel">

    <!-- Background decoration -->
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-circle bg-circle-3"></div>

    <div class="branding-content">
      <div class="brand-logo">
        <div class="brand-icon"><i class="bi bi-prescription2"></i></div>
        <span class="brand-name">Health<span class="brand-accent">Sync</span></span>
      </div>

      <p class="brand-tagline">Modern Healthcare<br />Management System</p>

      <div class="brand-features">
        <div class="feature-item">
          <div class="feature-dot"></div>
          <span>Manage patients &amp; appointments</span>
        </div>
        <div class="feature-item">
          <div class="feature-dot"></div>
          <span>Real-time doctor scheduling</span>
        </div>
        <div class="feature-item">
          <div class="feature-dot"></div>
          <span>Secure medical records</span>
        </div>
      </div>
    </div>

    <p class="brand-footer">© 2026 HealthSync. All rights reserved.</p>
  </section>

  <!-- ── Right Form ─────────────────────────────────────────────── -->
  <section class="form-panel">
    <div class="form-card">

      <div class="form-header">
        <h2 class="form-title">Welcome back</h2>
        <p class="form-subtitle">Sign in to your admin dashboard</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <div class="field-group">
          <label class="field-label" for="email">Email address</label>
          <div class="input-wrap">
            <i class="bi bi-envelope input-icon"></i>
            <input type="email" id="email" class="field-input" placeholder="you@example.com" formControlName="email" />
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="password">Password</label>
          <div class="input-wrap">
            <i class="bi bi-lock input-icon"></i>
            <input type="password" id="password" class="field-input" placeholder="Enter your password"
              formControlName="password" />
          </div>
        </div>



        <button type="submit" class="btn-submit">
          <span>Sign In</span>
          <i class="bi bi-arrow-right"></i>
        </button>

      </form>
    </div>
  </section>

</div>
