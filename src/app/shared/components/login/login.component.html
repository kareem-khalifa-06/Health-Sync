<div
  class="login-page d-flex justify-content-between align-items-center min-vh-100 mx-0"
>
  <!-- Left branding section -->
  <section
    class="d-flex flex-column justify-content-center px-5 w-50 bg-primary text-white vh-100 align-items-center"
  >
    <div class="d-flex align-items-center gap-3 mb-5">
      <i class="bi bi-prescription fs-1"></i>
      <h1 class="fw-bold mb-0">HealthSync</h1>
    </div>
    <p class=" captionss">Modern Healthcare Management System</p>
  </section>

  <!-- Right login form -->
  <section class="card shadow  w-50 vh-100 mx-auto d-flex flex-column px-5 justify-content-center">
    <h2 class="mb-5">Welcome Back</h2>
    <form class="mt-3" [formGroup]="loginForm" (ngSubmit)="onSubmit()"> 
      <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <input
          type="email"
          class="form-control"
          id="email"
          placeholder="you@example.com"
          formControlName="email"/>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          id="password"
          placeholder="......."
          formControlName="password"
        />
      </div>
      <div class="mb-3 form-check d-flex justify-content-between">
        <div>
            <input type="checkbox" class="form-check-input" id="exampleCheck1" />
        <label class="form-check-label" for="exampleCheck1">Remember me</label>
        </div>
        
        <a href="#" class="text-primary">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary w-100 mb-4">Submit</button>
      <div class="text-center text-muted">Don't have an account?
         <a routerLink="/register">Sign up</a>
        </div>
    </form>
  </section>
</div>
