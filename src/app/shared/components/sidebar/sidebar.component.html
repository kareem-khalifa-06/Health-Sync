<aside class="sidebar" [class.collapsed]="collapsed">

  <!-- ── Logo ──────────────────────────────────────────────────── -->
  <div class="sidebar-logo">
    <a routerLink="/adminLayout" class="logo-link">
      <div class="logo-mark">
        <i class="bi bi-prescription2"></i>
      </div>
      <span class="logo-text sidebar-label">Health<span class="logo-accent">Sync</span></span>
    </a>
    <button class="collapse-btn" (click)="collapsed = !collapsed" [title]="collapsed ? 'Expand' : 'Collapse'">
      <i class="bi" [ngClass]="collapsed ? 'bi-chevron-right' : 'bi-chevron-left'"></i>
    </button>
  </div>

  <!-- ── Nav ───────────────────────────────────────────────────── -->
  <nav class="sidebar-nav">
    <span class="nav-section-label sidebar-label">Main</span>

    <a routerLink="dashboard" routerLinkActive="active" class="nav-link" [title]="collapsed ? 'Dashboard' : ''">
      <i class="bi bi-speedometer2 nav-icon"></i>
      <span class="sidebar-label">Dashboard</span>
    </a>

    <a routerLink="appointments" routerLinkActive="active" class="nav-link" [title]="collapsed ? 'Appointments' : ''">
      <i class="bi bi-calendar-check nav-icon"></i>
      <span class="sidebar-label">Appointments</span>
      <span class="nav-badge sidebar-label">12</span>
    </a>

    <a routerLink="patients" routerLinkActive="active" class="nav-link" [title]="collapsed ? 'Patients' : ''">
      <i class="bi bi-people nav-icon"></i>
      <span class="sidebar-label">Patients</span>
    </a>

    <a routerLink="doctors" routerLinkActive="active" class="nav-link" [title]="collapsed ? 'Doctors' : ''">
      <i class="bi bi-person-badge nav-icon"></i>
      <span class="sidebar-label">Doctors</span>
    </a>

    <span class="nav-section-label sidebar-label">Records</span>

    <a routerLink="medical-records" routerLinkActive="active" class="nav-link"
      [title]="collapsed ? 'Medical Records' : ''">
      <i class="bi bi-folder2-open nav-icon"></i>
      <span class="sidebar-label">Medical Records</span>
    </a>

    <a routerLink="prescriptions" routerLinkActive="active" class="nav-link" [title]="collapsed ? 'Prescriptions' : ''">
      <i class="bi bi-capsule nav-icon"></i>
      <span class="sidebar-label">Prescriptions</span>
    </a>

    <a routerLink="analytics" routerLinkActive="active" class="nav-link" [title]="collapsed ? 'Analytics' : ''">
      <i class="bi bi-graph-up-arrow nav-icon"></i>
      <span class="sidebar-label">Analytics</span>
    </a>
  </nav>

  <!-- ── Footer ────────────────────────────────────────────────── -->
  <div class="sidebar-footer">
    <div class="custom-dropdown">
      <button class="settings-btn" [title]="collapsed ? 'Settings' : ''">
        <i class="bi bi-gear-fill nav-icon"></i>
        <span class="sidebar-label">Settings</span>
        <i class="bi bi-chevron-up chevron-icon sidebar-label"></i>
      </button>
      <ul class="dropdown-menu-custom">
        <li>
          <button class="dropdown-item-custom" (click)="_AuthService.logout()">
            <i class="bi bi-box-arrow-right"></i> Sign out
          </button>
        </li>
      </ul>
    </div>
  </div>

</aside>
